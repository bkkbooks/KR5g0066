front:
  text: 重刋道藏輯要
  hash: sha256:972c3c5029b24a17e27f2b03a7e86d4422a7e71d4455eb70dca445dd908b9848
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0066_YP-C_15kuiji-01-0001a, image: JY173/15kuiji-01-0001a.png}
body:
  text: 至眞歌海蟾帝君著我爲諸君說端的命蒂從來在眞息照體長存空不空靈鑑涵天容萬物太極布妙人得一得一善持謹勿失宫室虛閑神自居靈府煎熬枮血液一悲一喜一思慮一縱一勞形蠹弊朝傷暮損迷不知喪亂精神無所據細細消磨漸漸衰用竭元氣神乃去只道行禪坐亦禪聖可如斯凡不然萌芽脆嫩須含蓄根識昏迷易變遷蹉跎不解去荆棘未聞美稼出荒田九年功滿火候足應物無心神化速無心心卽是眞心動靜兩忘爲離欲神是性兮氣是命神不外馳氣自定本來兩物更誰親失卻將何爲本柄混合爲一復忘一可與元化同出沒透金貫石不爲難坐脫立忘猶倐忽此道易知不易行行忘所行道乃畢莫將閉息爲眞務數息按圖俱未是比來放下外塵勞內有縈心兩何異但看嬰兒處胎時豈解有心濳算計專氣致柔神久留往來眞息自悠悠綿延迤邐歸元命不汲靈泉常自流三萬六千爲大功陰陽節候在其中蒸融關脈變筋骨處處光明無不通三彭走出陰尸宅萬國來朝赤帝宫借問眞人何處來從前元只在靈臺昔年雲霧深遮蔽今日相逢道眼開此非一朝與一夕是我本眞不是術嵗寒堅確如金石戰退陰魔加慧力皆由虛淡復精專便是華胥淸靜國初將何事立根基到無爲處無不爲念中境象須除撥夢裏精神牢執持不動不靜爲大要不方不圓爲至道元和內煉卽成眞呼吸外求終未了元氣不住神不安蠹木無根枝葉乾休論涕唾與精血達本窮源總一般此物何曾有定位隨時變化因心意在體感熱卽爲汗在眼感悲卽爲淚在腎感念卽爲精在鼻感風卽爲涕縱橫流轉潤一身到頭不出於神水神水難言識者稀資生一切由眞氣但知恬淡無思慮齋戒寍心節言語一味醍醐甘露漿飢渴消除見眞素他時功滿自逍遙初日煉烹實勤苦勤苦之中又不勤閒閒祗要養元神奈何心使閒不得到此縱擒全在人我今苦中苦更苦木食草衣孤又靜心知大道不能行名迹與身爲大病比如閒處用功夫爭似泰然坐大定形神雖曰兩難全了命未能先了性不去奔名與逐利絕了人情總無事決烈在人何住滯在我更教誰制御掀天聲價又如何倚馬文章非足貴榮華衣食總無心積玉堆金復何濟工巧文章與詞賦多能礙卻修行路恰如薄霧與輕烟閒傍落花隨柳絮縹緲幽閒天地間到了不能成雨露名與身兮竟孰親半生嵗月大因循比來修煉頼神氣神氣不安空苦辛可憐一個好基址金殿玉堂無主人勸得主人長久住置在虛閒無用處無中妙有執持難解養嬰兒須藉母緘藏俊辯黜聰明收卷精神作愚魯堅心一志任前程大道於人終不負
