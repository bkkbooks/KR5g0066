body:
  text: 還初道人董漢醇編日用訣夫日用者飲食則定禁口端坐莫起一念萬事俱忘存神定意眼不視物耳不聽聲一心內守調息綿綿漸漸呼出莫教間斷似有如無自然心火下降腎水上升口裏津生靈真附體得至長生之路也十二時中常要清靜一念不起謂之清靈臺無物謂之淨身是氣之宅心是神之舍意行則神行神行則氣散神聚則五行真氣結成刀圭自然身中有身冲和氣透醍醐灌頂行住坐卧常覺身體如風之行腸中如雷之鳴耳聽仙音無絃之曲不言而自聲不鼓而自鳴神氣交結男兒回轉得觀內景能自言語見虛無之事與聖同居神自出入天地齊壽脫離生死矣莫教有損十二時中常要清靜神是氣之子氣是神之母如雞抱卵存神養氣能無離乎妙哉妙哉關尹子節要關尹子曰非有道不可言不可言即道非有道不可思不可思即道言之如吹影思之如鏤塵聖智造迷鬼神不識又曰不知道妄意卜者如射覆盂高之者曰存金存玉中之者曰存角存羽卑之者曰存瓦存石是乎非是乎唯置物者知之又曰道終不可得彼可得者名德不名道道終不可行彼可行者名行不名道聖人以可得可行者所以善吾生以不可得不可行者所以善吾死又曰一情冥為聖人一情善為賢人一情惡為小人一情冥者自有之無不可得而示一情善惡者自無起有不可得而祕一情善惡為有知惟動物有之一情冥為無知普天之下道無不在又曰一灼之火能燒萬物物亡而火何存一息之道能冥萬物物亡而道何在又曰吾道如處暗夫處明者不見暗中一物而處暗者能見眀中區事又曰籩不問豆豆不答籩瓦不問石石不答瓦道亦不失問歟答歟一氣往來道何在又曰一運之象周乎太空自中而升為天自中而降為地無有升而不降無有降而不升升者為火降者為水欲升而不能升者為木欲降而不能降者為金木之為物鑽之得火絞之得水金之為物擊之得火鎔之得水金木者水火之交也水為精為天火為神為地木為魂為人金為魄為物運而不已者為時包而有在者為方惟土終始之又曰天地雖大有色有形有數有方吾有非色非形非數非方而天天地地者存又曰夢中鑑中水中皆有天地存焉欲去夢天地者寢不寐欲去鑑天地者形不照欲去水天地者盎不汲彼之有無在此不在彼是以聖人不去天地去識又曰天地寓萬物寓我寓道寓苟離乎寓道亦不立又曰行雖至卓不離高下言雖至公不離是非能雖至神不離巧拙貌雖至殊不離妍醜聖人假此以示天下天下冥此乃見聖人又曰道無體以道應世者是事非道道無方以道寓物者是物非道聖人竟不能出道以示人又曰蝍蛆食蛇蛇食蛙蛙食蝍蛆互相食也聖人之言亦然言有無之弊又言非有非無之弊又言去非有非無之弊言之如引鋸然惟善聖者不留一言又曰利害心愈明則親不睦賢愚心愈明則友不交是非心愈明則事不成好醜心愈明則物不契是以聖人渾之又曰聖人以有言有為有思者所以同乎人以未嘗言未嘗為未嘗思者所以異乎人又曰以聖師聖者賢人以賢師聖者聖人蓋以聖師聖者徇跡而忘道以賢師聖者反跡而合道又曰衆人以魄攝魂聖人以魂運魄蓋魄之藏魂俱之魂之游魄因之魂晝寓目魄夜舍肝寓目能見舍肝能夢又曰果之有核必待水火土三者貝矣然後相生不窮三者不貝如大旱大潦大塊皆不足以生物精水神火意土三者本不交惟人以根合之又曰庖人羹蟹遺一足几上蟹已羹而遺足尚動是生死者一氣聚散爾不生不死而人橫計曰生死又曰無一心五識並馳心不可一無虛心五行皆具心不可虛無靜心萬化密移心不可靜借能一則二偶之借能虛則實滿之借能靜則動搖之惟聖人能斂萬有於一息無有一物可役吾之眀徹散一息於萬有無一物可間吾之云為又曰流者舟也所以流之者是水非舟運者車也所以運之者是牛非車思者心也所以思之者是意非心不知所以然而然惟不知所以然而然故其來無從其往無在其來無從其往無在故能與天地本原不古不今又曰是非好醜成敗盈虛造物者運矣皆因私識執之而有於是以無遣之猶存以非有非無遣之猶存譬如昔游再到記憶宛然此不可忘不可遣善去識者變識為智變識為智之說汝知之乎曰想如思鬼心栗思盜心怖曰識如認黍為稷認玉為石皆浮游罔象無所底止譬覩奇物生奇物想生奇物識此想此識根不在我譬如今日而已至於來日想識殊未可卜及至來日紛紛想識皆緣有生曰想曰識譬犀望月月影入角因想識生始有月形而彼真月初不在角胸中之天地萬物亦然知此說者外不見物內不見情又曰情生於心心生於性情波也心流也性水也來干我者如石火頃以性受之則心不生物浮浮然又曰賢愚真僞有識者有不識者彼雖有賢愚彼雖有真僞而謂之賢愚真僞者繫我之識知夫皆識所成故雖真者亦僞矣又曰天地雖大能役有形不能役無形陰陽雖妙能役有氣而不能役無氣知夫我之心無氣無形則天地陰陽不能役之又曰人之平日目忽見非常之物者皆精有所結而使之然人之病日目忽見非常之物者皆心中有所歉而使之然苟知吾心能於無中示有則知吾心能於有中示無但不信之自然不神或曰厥識既昏孰能不信我應之曰如捕蛇師心不怖蛇彼雖夢蛇而無怖畏故黃帝曰道無鬼神獨往獨來又曰有人問於我曰爾族何氏何名何字何衣何食何友何僕何琴何書何古何今我時默然不對一字或人叩之不已我不得已應之曰尚自不見我將何為我所又曰氣之為物有合有散我之所以行氣者本未嘗合亦未嘗散有合者生有散者死彼未嘗合未嘗散者無生無死客有去來郵常自若又曰困天下之智者不在智而在愚窮天下之辨者不在辨而在訥服天下之勇者不在勇而在怯又曰少言者不為人所忌少行者不為人所短少智者不為人所勞少能者不為人所役又曰言某事者甲言利乙言害丙言或利或害丁言俱利俱害必居一于此矣喻道者不言又曰言道者如言夢夫言夢者曰如此金玉如此器皿如此禽獸言者能言之不能取而與之聽者能聞之不能受而得之惟善聽者不泥不辨又曰方術之在天下多矣或尚晦或尚明或尚强或尚弱執之皆事不執之皆道又曰吾道如海有億萬金投之不見有億萬石投之不見有億萬污穢投之不見能運小蝦小魚能運大鯤大鯨合衆水而受之不為有餘散衆水而分之不為不足又曰天下之人蓋不可以億兆計人之夢各異夜夜之夢各異有天有地有人有物皆思成之蓋不以塵計安知今之天地非有思者乎又曰死胎中者死卵中者亦人亦物天地雖大彼固不知計天地者皆我區識譬如手不觸刃刃不傷人又曰有時者氣彼非氣者未嘗有晝夜有方者形彼非形者未嘗有南北何謂非氣氣之所自生者如搖箑得風彼未搖時非風之氣彼已搖時即名為氣何謂非形形之所自生者如鑽木得火彼未鑽時非火之形彼已鑽時即名為形又曰聖人不異衆人特物不能拘爾又曰在己無居形物自著其動若水其靜若鏡其應若響芒乎若亡寂乎若清同焉者和得焉者失未嘗先人而常隨人又曰輕清者魄從魂升重濁者魂從魄降魂魄半之則在人間升魂為貴降魄為賤靈魂為賢厲魄為愚輕魂為明重魄為暗揚魂為羽鋭魄為毛明魂為神幽魄為鬼其形其居其識其好皆以五行契又曰愛為精觀為神愛觀雖異皆因識生惟其愛之無識如鎖之交觀之無識如燈之照吾識不萌吾生何有又曰核芽相生不知其幾萬株天地雖大不能芽空中之核雌卵相生不知其幾萬禽陰陽雖妙不能卵無雄之雌惟其來干我者皆攝之以一息則變物為我無物非我所謂五行者孰能變之又曰如桴叩鼓鼓之形者我之有也鼓之聲者我之感也桴已往矣餘聲尚存終亦不存而矣鼓之形如我之精鼓之聲如我之神其餘聲者猶之魂魄知夫倏往忽來則五行之氣我何有焉又曰知夫此身如夢中身隨情所見者可以飛神作我而遊太清知夫此物如夢中物隨情所見者可以凝神作物而駕八荒是道也能見精神而久生能忘精神而超生吸氣以養精如金生水吸風以養神如木生火所以假外以延精神潄水以養精精之所以不窮摩火以養神神之所以不窮所以假內以延精神若夫忘精神而超生者吾嘗言之矣又曰計生死者或曰死已有或曰死已無或曰死已亦有亦無或曰當幸者或曰當懼者或曰當任者或曰當超者愈變識情馳騖不已殊不知我之生死如馬之手牛之翼本無有復無無譬如水火雖犯水火不能燒之不能溺之又曰物我交心生兩木摩火生不可謂之在我不可謂之在彼不可謂之非我不可謂之非彼執而彼我之則愚又曰勿以我心揆彼當以彼心揆彼知此說者可以周事可以行德可以貫道可以交人可以忘我又曰汝見蛇首人身者牛臂魚鱗者鬼形禽翼者汝勿怪此怪不及夢夢怪不及覺有耳有目有手有臂怪尤矣大言不能言大智不能思又曰目自觀目無色耳自聽耳無聲舌自嘗舌無味心自揆心無物衆人逐於外賢人執於內聖人皆僞之又曰人無以無知無為者為無我雖有知有為不害其為無我譬如火也躁動不停未嘗有我又曰譬如大海能變化億萬蛟魚水一而已我之與物蓊然蔚然在大化中性一而已知夫性一者無人無物無死無生又曰水潜故藴為五精火飛故達為五臭木茂故華為五色金堅故實為五聲土和故滋為五味其常五其變不可計其物五其雜不可計然則萬物在天地間不可執謂之萬不可執謂之五不可執謂之一不可執謂之非萬不可執謂之非五不可執謂之非一或合之或離之以此必形以此必數以此必氣徒自勞爾物不知我我不知物又曰鳥獸俄呦呦俄旬旬俄逃逃草木俄茁茁俄亭亭俄蕭蕭天地不能留聖人不能繫有運者存焉爾有之在彼無之在此鼓不桴則不鳴偶之在彼奇之在此桴不手則不擊又曰均一物也衆人惑其名見物不見道賢人析其理見道不見物聖人合其天不見道不見物一道皆道不執之即道執之即物又曰昔之論道者或曰凝寂或曰邃深或曰澄徹或曰空同或曰晦明慎勿遇此而生怖退天下至理竟非言意苟知非言非意在彼微言妙意之上乃契吾說又曰事有在事言有理道無在道言無理知言無理則言言皆道不知言無理雖執至言為梗為翳又曰人徒知僞得之中有真失殊不知真得之中有真失徒知僞是之中有真非不知真是之中有真非談景升化書道之委也虛化神神化氣氣化形形化生而萬物所以塞也道之用也形化氣氣化神神化虛虛明而萬物所以通也是以古聖人窮通塞之端得造化之源忘形以養氣忘氣以養神忘神以養虛虛實相通是謂大同故藏之為元精用之為萬靈含之為太一放之為太清是以坎離消長於一身風雲發泄於七竅真氣薰蒸而時無寒暑純陽流注而民無死生是謂神化之道者也且夫當空團塊見塊而不見空粉塊求空見空而不見塊形無妨而人自妨之物無滯而人自滯之龍可以蹈虛空虛空非無也可以實金石金石非有也有無相通物我相同其生非始其死非終知此道者形不可得斃神不可得逝稚子弄影不知為影所弄狂夫侮像不知為像所侮化家者不知為家所化化國者不知為國所化化天下者不知為天下所化虛化神神化氣氣化血血化形形化嬰嬰化童童化少少化壯壯化老老化死死復化為虛虛復化為神神復化為氣氣復化為物化化不間猶環之無窮夫萬物非欲生不得不生萬物非欲死不得不死達此理者神可以不化形可以不生爪髮者我之形何爪可割而無害髮可截而無痛蓋營衛所不至也則是我本無害而筋骨為之害我本無痛而血肉為之痛所以喜怒非我作哀樂非我動我為形所昧形為我所愛達此理者可以出生死之外太上者虛無之神也天地者陰陽之神也人蟲者血肉之神也其同者神其異者形是故形不靈而氣靈氣不靈而聲靈覺不靈而夢靈生不靈而死靈水至清而結冰不清神至眀而結形不眀冰泮返清形散返明能知真死者可以遊太上之京虛化神神化氣氣化形形氣相乘而成聲耳非聽聲也而聲自投之谷非應響也而響自滿之耳小竅也谷大竅也山潭小谷也天地大谷也一竅鳴而萬竅皆鳴一谷聞而萬谷皆聞聲導氣氣導神神導虛虛含神神含氣氣含聲相導相含雖秋蚊之翾翾蒼蠅之營營無所不至也由此知雖絲毫之慮必有所察雖啾唧之言必有所聞惟大人之機天地莫能見陰陽莫能知鬼神莫能窺方咫之木置於地之上使人蹈之而有餘方咫之木置於竿之端使人踞之而不足非物有大小蓋心有虛實是故冒大暑而撓之愈熱受炙灼而懼者愈痛人無常心物無常性由是知水可使不濕火可使不燥海魚有以蝦為目者人皆笑之殊不知古人以囊螢為燈者又不知晝非日之光則不能馳夜非燭之光則有所欺觀傀儡之假而不自疑嗟朋友之逝而不自悲賢與愚莫知惟抱純白養太玄者不入其機鏡非求鑒於物而物自投之橐非求包於氣而氣自實之是故鼻以虛受臭耳以虛受聽目以虛受色舌以虛受味所以心同幽冥則物無不受神同虛無則事無不知是以大人奪其機藏其微羽符至怪陰液至奇可以守國可以救時可以坐為帝王之師天下賢愚營營然笑飛蛾之投夜燭蒼蠅之觸曉窗知往不知還知進不知退而害以就利不知聚利以就害賢於人而不賢於身何賢之謂也博於物而不博於己何博之謂也是以大人利害俱忘何所不藏夫禽獸之於人也何異有巢穴之居有夫婦之配有父子之性有生死之情烏反哺仁也隼憫胎義也蜂有君禮也羊跪乳智也雉不再接信也孰究其道萬物之中五常百行無所不有也而教之為網罟使之務畋漁且夫焚其巢穴非仁也奪其親愛非義也以斯為享非禮也教民殘暴非智也使萬物懷疑非信也夫羶臭之欲不止殺害之機不已羽毛雖無言必狀我為貪狼之與封豕鱗介雖無知必名我為長鯨之與巨虺也胡為自安焉得不恥吁直疑自古無君子救物而稱義者人不義之行惠而求報者人不報之民之情也讓之則多爭之則少就之則去避之則來與之則輕惜之則奪是故大義無狀大恩無象大義成不知者荷之大恩就不識者報之能歌者不能者聽之能舞者不能者觀之巧者不巧者辨之賢者不賢者任之夫養木者必伐之待士者必死之網之以冠冕鈎之以爵祿若馬駕車輅貴不我得彘食糟糠肥不我有是以大人道不虛貴德不虛守貧有所倚退有所恃退者非樂寒賤而甘委棄為惡者畏人識必有識者為善者欲人知必有不知者是故人不識者謂之大惡人不知者謂之至善吳尊師玄綱論道者虛無之系造化之根神明之本天地之源其大無外其微無內浩曠無端杳冥無對至幽靡察而大明垂光至靜無心而品物有方混漠無形寂寞無聲萬象以之生五音以之成生者有極成者必虧生生成成古今不移此之謂道也德者天地所禀陰陽所資經以五行緯以四時牧之以君訓之以師幽冥動植咸暢其宜澤流無窮羣生不知藉其功惠加無極百姓不知賴其力此之謂德也然則通而生之謂之道道固無名焉蓄而成之謂之德德固無稱焉嘗試論之曰天地人物靈仙鬼神非道無以生非道無以成生者不知其始成者不見其終探奧索隱孰窺其宗入有之末出無之先莫究其眹謂之自然自然者道德之常天地之綱也右論道德太虛之先寂寥何有至精感激而真一生焉真一運神而元氣自化元氣者無中之有有中之無廣不可量微不可測氤氲漸著混茫無倪萬象之端兆眹於此清通澄朗之氣浮而為天濁滯煩昧之氣積而為地平和柔順之氣結而為人倫錯謬剛戾之氣散而為雜類自一氣之所育播萬殊而種分既涉化機遷變罔極然則天地人物之形者元氣也受天地人物之靈者神明也故乾坤統天地精魂御人物氣有陰陽之革神無寒暑之變雖羣動紏紛不可勝紀滅而復生終而復始而道德之體神明之心應感不窮未嘗疲於動用之境矣右論元氣諸章節要天地不能自有有天地者太極太極不能自運運太極者真精真精自然惟神惟明無祖無宗不始不終含和藴慈愍俗哀蒙清濁異禀真凡莫同降氣分光聿生人中賢明博逹周濟為功為君為長俾物咸通純陽赫赫在于上九天之上無陰也純陰冥冥處于下九地之下無陽也陰陽混蒸而生萬有者正在天地之間故氣象變通晦明有類陽明而正其粹為真靈陰晦而邪其精為魔魅故禀陽靈而生者為睿哲資陰昧而育者為凶頑陽好生故睿哲者必惠和陰好殺故凶頑者必悖戾或善或否者乃二氣均合而生中人也二者各有所禀而教安施乎教之所施為中人爾何者睿哲不教而自知凶頑雖教而不移此皆受陰陽之純氣也亦猶火可滅不可使之寒冰可消不可使之熱理固然也夫生我者道禀我者神而壽夭去留匪由於己何也以性動為情情返於道故為化機所運不能自持也將超跡於存亡之域棲心於自得之鄉者道可以為師神可以為友何謂其然乎蓋道與神無為而氣自化無慮而物自成入於品彚之中出於生死之表故君子黜嗜欲隳聰明視無色聽無聲恬淡純粹體和神清虛夷忘形乃合至精此所謂返我之宗復與道同造化莫能測鬼神莫能知況於人乎通於道者雖翺翔宇宙之外而心常寧雖體息毫釐之內而氣自運故心不寧則無以同乎道氣不運則無以存乎形形存道同天地之德也是以動而不知其動者超乎動者也靜而不知其靜者出乎靜者也超乎動者陽不可得而推出乎靜者陰不可得而移陰陽不能變而況於萬物乎故不為物所誘者謂之至靜至靜能契於至虛虛極則明明極則瑩瑩極則徹徹者雖天地之廣萬物之殷不能逃方寸之鑑矣夫道包億萬之數而不為大貫秋毫之末而不為小先虛無而不為始後天地而不為終升積陽而不為明淪重陰而不為晦本無神也虛極而神自生本無氣也神運而氣自化氣本無質凝委而成形形本無情動用而虧性形成性動去道彌遠故溺於生死遷於陰陽不能自止非道存而物亡也故道能自無而生有豈不能使有同於無乎有同於無則有不滅矣陰與陽並而人乃生魂為陽神魄為陰靈結胎運氣育體搆形然勢不俱全則各返其本故陰勝則陽竭而死陽勝則陰消而仙柔和慈善貞清者陽也剛狠嫉妬淫濁者陰也心淡而虛則陽和襲意燥而欲則陰氣入明此二者陽勝陰伏長生之漸也道不欲有心有心則真氣不集又不欲苦忘心忘心則客邪來舍故我心不傾則物無不正動念有著則物無不邪邪正之來在我而已故上學之士怠於存念者陰尸勝之也欣於勤純者陽神勝之也一怠一勤者其戰未决也决之者在於克節勵操務違懈怠之意使精專無輟於斯須久於其事者尸銷而神王謂之陽勝陽勝者道其鄰乎且夫形動而心靜神凝而跡移者無為也間居而神擾拱默而心馳者有為也無為則理有為則亂雖無為至易非至明者不可致也夫天地晝亦無為夜亦無為無為則一而理亂有殊何哉晝無為以明故衆陽見而群陰伏夜無為以晦故群陰行而衆陽息是以主明而無為者則忠良進姦佞匿而天下理主暗而有為者則忠良隱姦佞職而天下亂故達者之無為以慧蔽者之無為以昏慧則通乎道昏則同乎物上學之士時有高興寄傲陶然於自得之鄉謂真仙可接霄漢可升者神之王也雖曰神王猶恐陽和之氣發泄陰邪之氣承襲耳可入靜室夷心抑制所起靜默專一則神不散而陽靈全謹無恣其康樂之清以致陰邪之來爾若有時躁競煩悖者乃形中諸魄為靈之氣所鍊陰尸積滯將散擾於絳宫之真可入靜室存一握固候神清意平合於虛靜斯亦洗心之一術耳言勿過乎行行無愧乎心行之不已則天地愛之神明佑之凶橫無由加鬼神不能擾若言清而行濁名潔而迹污雖醜蔽於外而心慚於內天地疾之神明殛之雖力强於道不可致也故寧受人之毁無招天之譴人毁猶可弭天譴不可逭也道之所至忌者淫殺陰賊此誠易戒至於小小喜怒是非可否人之常情甚難慎也都不欲有纖芥之事關乎方寸之中慮靜神間則邪氣不能入我志不擾則真人為儔好譽而憎毁者賢達之所未免然審己無善而獲譽者不祥省躬無疵而獲謗者何傷陽之精曰魂與神陰之精曰尸與魄神勝則為善尸强則為惡制惡興善則理忘善縱惡則亂理久則尸滅而魄鍊亂久則神逝而魂消尸滅魄鍊者神與形合而為仙神逝魂消者尸與魄同而為鬼自然之道也夫目以妖艷為華心以聲名為貴身好輕鮮之飾口欲珍奇之味耳快美好之音鼻悅芳香之氣此六者皆敗德傷性伐其靈根者也故有之則冝遠無之不足求惟衣與食人之日用所切也亦務道者之一弊耳然當委心任運未有不浩其所用且天地之生禽獸也猶覆之以羽毛供之以蟲粒而況於人乎必在忘其所趣任其自然爾覺與陽合寐與陰并覺多則魂强寐久則魄壯魂强者生之徒魄壯者死之徒若餐元和徹滋味使神清氣爽至於晝夜不寐者善無以加焉人心久任之則浩蕩而忘返頓棲之則超躍而無根任之則蔽乎我性棲之則勞乎我神使致道者奚方而靜蓋性本至凝物感而動習動滋久胡能遽寧既習動而播遷可習靜而恬晏故善習者寂而有裕不善習者煩而無功是以將躁而制之以寧將邪而間之以正將求而抑之以捨將濁而澄之以清優哉游哉不欲不營行於是止於是造次於是逍遙於是習此久者則物冥於外神鑒於內不思靜而自靜矣故履霜為堅冰之始習靜為契道之階古人云積習生常其斯之謂歟或問古今學仙者多而得道者少何也答曰常人學道者千而知道者一知道者千而志道者一志道者千而專精者一專精者千而勤久者一是以學者衆而成者寡也或曰仙者人之所至美者也死者人所之至惡者也世人君子罔有不知而從俗者至多習仙者至少何也答曰此有二理一者所禀之氣非高則所希之志難廣故溺於近務忘於遠見為聲色所汩嗜欲所昏終執從於世網竟無蹈於真域二者雖氣禀清虛神襟秀邁而濟物之功未備則登仙之路猶遠是以遲回人爵未解帝懸耳或曰道本無象仙貴有形以有契無理難長久曷若得性遺形之妙乎答曰夫道至虛極也含神運氣自無而生有故空洞杳冥者大道無形之形也天地日月者大道有形之形也以無係有以有含無故乾坤永存仙聖不滅生者天地之大德也所以示六合之廣三元之明者為吾有形也一從淪化而天地萬物盡非吾有死者人倫之荼毒也是以鍊凡至於仙鍊仙至於真鍊真合於妙合妙同乎神神與道合則道為我身所以升玉京遊金闕能有能無不終不沒何謂理難長久乎若濁以得性為妙不知鍊形為要者所謂清靈善爽之鬼何可與高仙為比哉群仙要語纂集上群仙要語纂集下鼓五還初道人董漢醇編虛靖天師心說夫心者萬法之宗九竅之主生死之本善惡之源與天地而並生為神明之主宰或曰真君以其師長於一體也或曰真常以其越古今而不壞也或曰真如以其寂然而不動也用之則彌滿六虛廢之則莫知其所其大無外則宇宙在其間其細無內則入秋毫之末而不可以象求矣此所謂我之本心而空劫以前本來之自己也然則果何物哉杳兮冥兮恍兮惚兮不可以知知不可以識識强名曰道强名曰神强名曰性强名曰心如此而已由是觀之豈不大哉豈不貴哉然輪回生死而不能自己者何也蓋一念萌動於內六識流轉於外不趨乎善則趨乎惡故有天堂地獄因果之報六道輪回無有出期可不痛哉可不悲哉若夫達人則不然也故齊戒以誠明其德一真澄湛萬禍消除老子曰致虛極守靜篤萬物並作吾以觀其復夫物藝藝各歸其根歸根曰靜靜曰復命復命曰常知常曰明不知常妄作凶所謂常者越古今而不壞者是也所謂妄者一念才起者是也莊子曰既以為物矣欲復歸根不亦難乎在易也其為大人乎自兹以往謹言語節飲食除垢止念靜心守一虛無恬淡寂寞無為收見返聽和光同塵瞥起是病不續是藥不怕念起惟恐覺遲譬如有髮朝朝思理有身有心胡不如是行住坐卧勿使須臾離也無何有之鄉華胥氏之國吾其游焉大道歌道不遠在身中物即皆空性不空性若不空和氣住氣歸元海壽無窮欲得身中神不出莫向靈臺留一物物在心中神不清耗散真精損筋骨神御氣氣留形不須雜術自長生術則易知道難遇縱然遇了不專行所以千人萬人學畢竟終無一二成神若出便收來神返身中氣自回如此朝朝還暮暮自然赤子産真胎重陽祖師論打坐凡打坐者非形體端然瞑目合眼謂之打坐此假打坐也十二時辰行住坐卧一切動中心似泰山不搖不動把斷四門眼耳鼻舌口不令內入外出者此名真打坐也能如此者雖身處塵世名已列於仙宫不須遠參便是肉身聖賢三年行滿脫殼登仙一粒丹成神遊八極矣論降心凡降心之道若湛然不動昏昏默默不見萬物杳杳冥冥不內不外無絲毫念想此是定心不可降也若隨境生心顛倒尋頭覓尾此名亂心敗壞道德損失性命不可縱也行住坐卧常勤降心聞見覺知此為病矣論鍊性理性如調琴絃緊則有斷慢則不應緊慢得中則琴可矣又如鑄劒鋼多則折錫多則卷鋼錫得中則劒可矣調鍊真性者體此二法論超三界欲界色界無色界此三界也心忘念慮即超欲界心忘諸境即超色界心不著空即超無色界離此三界神居仙聖之鄉性在玉清之境矣又詩云棄了惺惺學得癡到無為處無不為眼前世事只如此耳畔風雷過不知兩腳任從行處去一靈常與氣相隨有時四大醺醺醉借問青天我是誰坐忘銘常默元氣不傷少思慧燭內光不怒百脉和暢不惱心地清凉不求無諂無曲不執可圓可方不貪便是富貴不苟何懼君王味絶靈泉自降氣定真息自長觸則形斃神遊想則夢離尸殭氣漏形歸厚土念漏神趨鬼鄉心死方得神活魄滅然後魂昌轉物難窮妙理應化不離真常至精潜于恍惚大象混於渺茫造化若知規矩鬼神莫測行藏不飲不食不寐是謂真人坐忘文逸曹仙姑大道歌我為諸君說端的命蒂從來在真息照體長生空不空靈鑑涵天容萬物太極布妙人得一得一善持謹勿失宫室虛間神自居靈府煎熬枯血液一悲一喜一思慮一縱一勞形蠹弊朝傷暮損迷不知喪亂精神無所據細細消磨漸漸衰用竭元和神乃去只道行禪坐亦禪聖可如斯凡不然萌芽脆嫩須含蓄根識昏迷易變遷蹉跎不解去荆棘未聞美稼出荒田九年功滿火候足應物無心神化速無心心即是真心動靜兩忘為離欲神是性兮氣是命神不外馳氣自定本來二物更誰親失却將何為本柄混合為一復忘一可與元化同出沒透金貫石不為難坐脫立忘猶倏忽此道易知不易行行忘所行道乃畢莫將閉息為真務數息按圖俱未是比來放下外塵勞內有縈心兩何異但看嬰兒處胎時豈解有心潜算計專氣致柔神久留往來真息自悠悠綿延迤邐歸元命不汲靈泉常自流三萬六千為大功陰陽節候在其中蒸融關脉變筋骨處處光明無不通三彭走出陰尸宅萬國來朝赤帝宫借問真人何處來從前元只在靈臺昔年雲霧深遮蔽今日相逢道眼開此非一朝與一夕是我本真不是術歲寒堅確如金石戰退陰魔加慧力皆由虛淡復精專便是華胥清靜國初將何事立根基到無為處無不為念中境象須除撥夢裏精神牢執持不動不靜為大要不方不圓為至道元和內鍊即成真呼吸外求終未了元氣不住神不安蠹木無根枝葉乾休論涕唾與精血達本窮源總一般此物何曾有定位隨時變化因心意在體感熱即為汗在眼感悲即為淚在腎感念即為精在鼻感風即為涕縱橫流轉潤一身到頭不出於神水神水難言識者稀資生一切由真氣但知恬淡無思慮齊戒寧心節言語一味醍醐甘露漿饑渴消除見真素他時功滿自逍遙初日鍊烹實勤苦勤苦之中又不勤間間秖要養元神奈何心使間不得到此縱擒全在人我今苦中苦更苦木食草衣孤又靜心知大道不能行名迹與身為大病比如間處用工夫爭似泰然修大定形神雖曰兩難全了命未能先了性不去奔名與逐利絶了人情總無事决烈在人何住滯在我更教誰制御掀天聲價又如何倚馬文章非足貴榮華衣食總無心積玉堆金復何濟工巧文章與詞賦多能礙却修行路恰如薄霧與輕烟間傍落花隨柳絮縹眇幽間天地間到了不能成雨露名與身兮竟孰親半生歲月太因循比來修鍊賴神氣神氣不安空苦辛可憐一箇好基址金殿玉堂無主人勸得主人長久住置在虛間無用處無中妙有執持難解養嬰兒須惜母緘藏俊辨黜聰明收卷精神作愚魯堅心一志任前程大道於人終不負還真集夫修行之人若悟心地下功者切忌分别若生分别盡屬意家如何是心地下功先須頓捨諸緣次滅人我絶盡貪嗔形如槁木心似寒灰內外不分同觀一體朗然瑩徹靈光自現靈光者神光也光者照也神光內照更無暗昧外境難侵也若晝夜內神光不滅自然神定氣和此乃真修行也莊子曰宇泰定者發乎天光天光者神用之道也既得天光下降陰陽感擊至精發泄海泛浪滚一氣上升至於泥丸霹靂一聲百關神穴盡皆開通乃是靈光所至也自然五臟生和心經上湧舌生甘津鼻聞異香飲食漸减運火候鍊腸胃中退滓淘清去濁回陰换陽元氣克腹能絶飲食萬陰皆消也太上云但服元和除五穀是也如是此驗切忌身心輕忽智神踴躣心生懈怠談玄說妙和氣漸散前功若不謹守失其常者暗為聖賢所折也論識心悟性如要修行者先須識心識意然後悟性如何是心如何是意但能知覺謂之心千思萬想謂之意意從念起心從物生既知起生之根源者只在方寸方寸者是本來之真心也心本無心意本無意為從來熟境難忘心浮意動却把真性蒙昧不能顯焕須是澄心定意內觀其心湛然不動者謂之定中覺靈者謂之慧定是體慧是用定慧兩全者日用不虧也論法界法界者太虛也是太無也空寂無相若論一年乃是十一月建子陽光落地沈於九泉之下屬北方壬癸水萬物俱泯杳冥無迹恍惚無形易謂之山水蒙自上為山下為水水火未濟以待其時謂之童蒙也若論一月以辨晦朔之期月盡謂之晦被太陽鍊盡陰魄日月同爐光明不見萬象泯絶中間陰魄復受太陽一㸃真胎杳杳冥冥昏昏默默如太極未判二儀未分內隱重蒙之象也論二車般運羊車載火鹿車載水羊鹿二車三宫來往上下不停上田返中田中田返下田下田復返上田上田返入氣海接著真氣三事共聚再返起火也是周天火候謂之大牛車積纍鍊其金身也三車之外别有一車謂之破羊車有學道之人與心意相投性急太過陰陽不停或夢中見天崩地陷捽破羊車身體不安四肢無力而成疾病心反成魔或見耶鬼心神恍惚進退不常已入邪道不能成真矣白玉誓玄關顯祕論一言半句便通玄何必丹經千萬篇人若不為形所纍眼前便是大羅天若要鍊氣凝神須識歸根復命所以道歸根自有歸根竅復命還尋復命關且如這箇關竅若人得知真實處則歸根復命何難也故曰有人要識神仙訣只去搜尋造化根古者虛無生自然自然生大道大道生一氣一氣分陰陽陰陽為天地天地生萬物則是造化之根也此乃真一之氣萬象之先太虛太無太空太玄杳杳冥冥非尺寸之可量浩浩蕩蕩非涯岸之可測其大無外其小無內大包天地小入毫芒上無復色下無復淵一物圓明千古顯露不可得而名者聖人以心契之不獲已而名之曰道以是知心即是道也故無心則與道合有心則與道違惟此無之一字包諸有而無餘生萬物而不竭天地雖大能役有形不能役無形五行至精能役有數不能役無數百念紛紛能役有識不能役無識今夫修此道者不若先鍊形鍊形之妙在乎凝神凝神則氣聚氣聚則丹成丹成則形固形固則神全故宋齊丘云忘形以養氣忘氣以養神忘神以養虛只此忘之一字則是無物也本來無一物何處有塵埃其斯之謂乎如能喻此理就忘之一字做工夫可入大道之淵微奪自然之妙用立丹基於頃刻運造化於一身然此道視之寂寥無所覩聽之杳冥無所聞惟以心視之則有象以心聽之則有聲若學之士冥心凝神致虛守靜則虛室生白信乎自然也惟太上度人教人修鍊以乾坤為鼎器以烏兔為藥物以日魂之升沈應氣候之升降以月魄之盈虧應精神之衰旺以四季之節候應一日之時刻以周天之星數應一爐之造化是故採精神以為藥取靜定之火鍊之則成金液大還丹矣蓋真陰真陽之交會一水一火之配合要在先辨浮沈次明主客審抽添之運用察返復之安危故高象先云採有日取有時海蟾云開闔乾坤造化機煅鍊一爐真日月能悟之者效日月之運用與天地以同功夫豈知天養無象地養無體故天長地久日光月明真一長存虛空不朽也吾今則而象之無心於事無事於心內觀其心心無其心外觀其形形無其形遠觀其物物無其物知心無心知形無形知物無物超出萬幻確出一靈古經云生我於虛致我於無是宜歸性根之太始返未生之以前藏心於心心而不見藏神於神神而不出故能三際圓通萬緣澄寂六根清靜方寸虛明不滯於空不滯於無空諸所空無諸所無至於空無所空無無所無淨裸裸赤灑灑地則靈然而獨存者道非欲虛虛自歸之人能虛心道自歸之道本無名近不可取遠不可捨非方非圓非內非外惟聖人知之三毒無根六欲無種頓悟此理歸於虛無老子曰天地之間其猶橐籥乎虛而不屈動而愈出若能靜定之中抱冲和之氣守真一之精則是封爐固濟以行火候火本南方離卦離屬心心者神也神火也氣則藥以火鍊藥成丹即是以神馭氣而成道也人能手摶日月心握鴻濛自然見橐籥之開闔河車之升降水濟命宫火溉丹臺金火交併水土融和姹女乘龍金公跨虎通透三關上升內院化為玉汞下入重樓中有一穴名曰丹臺鉛汞相投水火相合有動之動出於不動有為之為出於無為當是時也白雪漫天黃芽滿地龍吟虎嘯夫唱婦隨玉鼎湯煎金爐火熾雷轟電掣撼動乾坤百脉聳然三關透徹玄珠成象太一歸真泥丸風生絳宫月明丹田煙暖谷海波澄鍊成還丹易如反掌七返九還方成大藥日鍊時烹以至九轉天關地軸在吾手中經云人能常清靜天地悉皆歸則是三華聚頂五氣朝元可久入衆妙門玄之又玄也更能晝運靈旗夜孕火芝溫就聖胎結成赤子至於脫胎神化回陽换骨則是玉符保神金液鍊形形神俱妙與道合真張平叔云都來片餉工夫永保無窮逸樂誠哉是言也蓋道之基德之本龍虎之宗鉛汞之祖三火所聚八水同歸萬神朝會之門金丹妙用之源乃歸根復命之關竅也既能知此則欲不必遣而心自靜心不必澄而神自清一念不生萬幻俱寢身馭扶搖神遊淡漠方知道風清月白皆顯揚鉛汞之基水緑山青盡發露虎龍之旨海南白紫清初從陳泥丸學丹法每遇日中之冬至則開乾破巽留坤塞艮據天罡持斗柄謁軒轅過扶桑入廣寒面鶉尾舉黃鐘泛海槎登崑崙佩唐符撼天雷遊巫山呼黃童召朱兒取青龍肝白虎髓赤鳳血黑龜精入土釜啓熒惑命閼伯化丹砂開華池吸神水飲刀圭從無入有無質生質抽鉛添汞結成聖胎十月既滿氣足形圓身外有身謂之胎仙其訣曰用志不分乃可凝神灰心冥冥金丹內成此豫之所得也如此施肩吾云氣是添年藥心為使氣神若知行氣訣便是得仙人此詩簡明通玄造妙故佩而誦之自然到秋蟾麗天虛空消隕之地非枯木寒泉之士不能知此余既得此不容自默太上玄科曰遇人不傳失天道傳非其人泄天寶天涯海角尋遍無人不容輕傳恐受天譴深慮大道無傳丹經湮泯故作玄關顯祕論蓋將曉斯世以詔後來而壽金丹之一脉也復恐世人猶昧此理乃復為之說曰以眼視眼以耳聽耳以鼻調鼻以口緘口潜藏飛躍在乎一心先當習定凝神懲忿窒欲則水火既濟則金木交併金木交併則真土歸位真土歸位則金丹自然大如黍珠日服一粒神氣復克塞天地孟子曰善養吾浩然之氣者此也學者思之敬書以授留紫元云馬丹陽真人直言斷情除欲降心休與親戚相見休教心到處去行住坐卧乃至搬柴運水或上茅去也要心定念止湛然不動名為真心要處靜心間少語住好伴莫生念念是業根若外不入內不出常少語自然心定氣調若不澄心止念去欲斷情更外入內出出去外遊如何得自然調息只是一座空舍出者便是猿馬也自古過去一切神仙不敢越過澄湛二字又要心不逐一切物去心猿牢捉丹無漏意馬常擒性自明坐圜先生云動者心起者念去者意心澄意定物我俱忘澄澄湛湛只顯一性應物皆是心見物要不昧一性若只見物不見性便著邊徼却有輪回又云只緣見物不見性便是昧了一切行住坐卧只要降心使一性常現不昧止念者常要覺一切塵念皆是業根須要澄湛一性照破萬緣一切虛假其念細細調熟不起或問曰如何是應物不昧答曰耳目雖是聞見口內雖是言說只要心不著他或問鬼神不測處答曰只那一切虛寂便是也又問玄牝之門是謂天地根答曰玄者父牝者母各人八兩合成一斤一㸃元陽之氣便是根本又問復命歸根答曰只要心不逐一切物去不染不著心不起氣不散便是歸根若不能如此者不得歸根也又問如何是見性答曰那無心無念不著一物澄澄湛湛似月當空群仙要語纂集下
